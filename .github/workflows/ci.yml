name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Fetch source
        env:
          SOURCE_TARBALL: https://github.com/${{ github.repository }}/archive/${{ github.sha }}.tar.gz
        run: |
          curl -L --fail --retry 3 --retry-delay 5 -o source.tar.gz "$SOURCE_TARBALL"
          tar -xzf source.tar.gz --strip-components=1
          rm source.tar.gz

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --dev --all-extras

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy fascat/

      - name: Test
        run: uv run pytest

      - name: Build
        run: uv build

  core:
    name: Core without CAD/USD backends
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Fetch source
        env:
          SOURCE_TARBALL: https://github.com/${{ github.repository }}/archive/${{ github.sha }}.tar.gz
        run: |
          curl -L --fail --retry 3 --retry-delay 5 -o source.tar.gz "$SOURCE_TARBALL"
          tar -xzf source.tar.gz --strip-components=1
          rm source.tar.gz

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install dependencies
        run: uv sync --dev --all-extras

      - name: Remove optional geometry backends
        run: uv pip uninstall cadquery-ocp cadquery-ocp-proxy usd-core xatlas

      - name: Test backend-free core behavior
        run: uv run --no-sync pytest tests/test_mesh.py tests/test_profiles.py tests/test_backend_errors.py --no-cov
