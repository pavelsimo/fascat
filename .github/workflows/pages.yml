name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "scripts/build-docs-site.mjs"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Fetch source
        env:
          SOURCE_TARBALL: https://github.com/${{ github.repository }}/archive/${{ github.sha }}.tar.gz
        run: |
          curl -L --fail --retry 3 --retry-delay 5 -o source.tar.gz "$SOURCE_TARBALL"
          tar -xzf source.tar.gz --strip-components=1
          rm source.tar.gz

      - name: Build docs site
        run: node scripts/build-docs-site.mjs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/docs-site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
